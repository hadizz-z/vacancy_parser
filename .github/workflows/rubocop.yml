name: Rubocop

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  rubocop:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
    
    - name: Install rubocop
      run: gem install rubocop
    
    - name: Run rubocop
      run: rubocop --format simple || true
     
